<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Carbon Calculator</title>
    <style>
        body {
            background-color: #808000;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            border: none;
        }

        button {
            background-color: #556B2F;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
        }

        .card {
            margin-top: 20px;
            padding: 20px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>🌱 AI Carbon Credit Calculator</h1>
    <p>Describe your activity and get CO₂ emissions + carbon credits</p>

    <input id="userInput" placeholder="Example: I travelled 10 km by car">
    <br>
    <button onclick="calculate()">Calculate 🌍</button>

    <div id="result" class="card"></div>

    <script>
        const data = {
            car: 0.21,
            bus: 0.10,
            electricity: 0.82,
            lpg: 2.98,
            train: 0.05
        };

        function calculate() {
            let text = document.getElementById("userInput").value.toLowerCase();
            let numberMatch = text.match(/\d+/);

            if (!numberMatch) {
                document.getElementById("result").innerHTML = "❌ Please enter a number (e.g., 10 km)";
                return;
            }

            let value = parseInt(numberMatch[0]);
            let found = false;

            for (let activity in data) {
                if (text.includes(activity)) {
                    let factor = data[activity];
                    let co2 = value * factor;
                    let credits = co2 / 1000;

                    document.getElementById("result").innerHTML = `
                        <h3>✅ Activity Detected: ${activity}</h3>
                        <p>📊 Input Value: ${value}</p>
                        <p>🌫️ CO₂ Emitted: ${co2.toFixed(2)} kg</p>
                        <p>🌿 Carbon Credits: ${credits.toFixed(4)}</p>
                    `;
                    found = true;
                    break;
                }
            }

            if (!found) {
                document.getElementById("result").innerHTML = "❌ Activity not recognized";
            }
        }
    </script>

    <hr>
    <p>💡 1 Carbon Credit = 1000 kg CO₂</p>
    <p>Supported activities: car, bus, electricity, lpg, train</p>

</body>
</html>
